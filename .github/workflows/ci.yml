name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.8.1 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm check

      - name: Test
        run: pnpm test

  e2e:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.8.1 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build e2e package
        run: pnpm --filter @sofia-data/e2e build

      # Builds the PR's own Dockerfile/code (not a deployed environment), so
      # this job needs no GCP credentials and is safe to run on PRs from
      # forks. It exercises the exact same image that would ship to Cloud
      # Run, just running locally in the runner instead.
      - name: Build container image
        run: docker build -t sofia-data-mcp:pr-e2e .

      - name: Run container
        run: |
          docker run -d --name sofia-data-mcp-e2e -p 3000:3000 sofia-data-mcp:pr-e2e

      - name: Wait for container to become healthy
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/health > /dev/null; then
              echo "Container is healthy."
              exit 0
            fi
            sleep 1
          done
          echo "::error::Container did not become healthy in time."
          docker logs sofia-data-mcp-e2e
          exit 1

      - name: Run e2e tests against the local container
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        run: pnpm test:e2e

      - name: Show container logs on failure
        if: failure()
        run: docker logs sofia-data-mcp-e2e

      - name: Stop container
        if: always()
        run: docker rm -f sofia-data-mcp-e2e
