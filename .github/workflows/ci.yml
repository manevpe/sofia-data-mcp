name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm environment
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm check

      - name: Test
        run: pnpm test

  e2e:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm environment
        uses: ./.github/actions/setup-pnpm

      - name: Build e2e package
        run: pnpm --filter @sofia-data/e2e build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Builds the PR's own Dockerfile/code (not a deployed environment), so
      # this job needs no GCP credentials and is safe to run on PRs from
      # forks. It exercises the exact same image that would ship to Cloud
      # Run, just running locally in the runner instead. GHA cache speeds up
      # rebuilds of the pnpm install/build layers across CI runs.
      - name: Build container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: sofia-data-mcp:pr-e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d --name sofia-data-mcp-e2e -p 3000:3000 sofia-data-mcp:pr-e2e

      - name: Wait for container to become healthy
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/health > /dev/null; then
              echo "Container is healthy."
              exit 0
            fi
            sleep 1
          done
          echo "::error::Container did not become healthy in time."
          docker logs sofia-data-mcp-e2e
          exit 1

      - name: Run e2e tests against the local container
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        run: pnpm test:e2e

      - name: Show container logs on failure
        if: failure()
        run: docker logs sofia-data-mcp-e2e

      - name: Stop container
        if: always()
        run: docker rm -f sofia-data-mcp-e2e
