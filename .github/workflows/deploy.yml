name: Deploy to Cloud Run

# Runs only after the CI workflow succeeds on main, so a deploy can never
# ship code that failed build/typecheck/test. Can also be triggered manually.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for keyless Workload Identity Federation auth

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME || 'sofia-data-mcp' }}
        run: ./deploy/gcp/deploy-cloud-run.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.8.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build e2e package
        run: pnpm --filter @sofia-data/e2e build

      - name: Run post-deploy e2e smoke test
        id: e2e
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.service_url }}
        run: pnpm test:e2e

      - name: Roll back to previous revision on e2e failure
        if: ${{ failure() && steps.e2e.outcome == 'failure' && steps.deploy.outputs.previous_revision != '' }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME || 'sofia-data-mcp' }}
          PREVIOUS_REVISION: ${{ steps.deploy.outputs.previous_revision }}
        run: ./deploy/gcp/rollback-service.sh

      - name: No previous revision to roll back to
        if: ${{ failure() && steps.e2e.outcome == 'failure' && steps.deploy.outputs.previous_revision == '' }}
        run: |
          echo "::error::e2e smoke test failed on the first-ever deploy of this service — there is no previous revision to roll back to. Manual investigation required."
          exit 1
